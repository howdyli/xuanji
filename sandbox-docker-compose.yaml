# Dev/test sandbox for XiaoPaw v2
# Production compose with security hardening: see docs/08-deployment.md
#
# Usage:
#   docker compose -f sandbox-docker-compose.yaml up -d
#   # Sandbox MCP endpoint: http://localhost:8030/mcp
#
# CRITICAL: ./data/workspace is mounted as /workspace inside the sandbox.
# Bootstrap reads from ./data/workspace on the host; memory-save writes to
# /workspace inside the sandbox. They MUST be the same physical directory,
# otherwise cross-session memory persistence breaks.

services:
  aio-sandbox:
    image: ghcr.io/agent-infra/sandbox:latest
    ports:
      - "8030:8080"
    environment:
      QWEN_API_KEY: "${QWEN_API_KEY}"
      MEMORY_DB_DSN: "${MEMORY_DB_DSN:-}"
    volumes:
      - ./xiaopaw/skills:/mnt/skills:rw
      - ./data/workspace:/workspace:rw
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/ > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 3
